<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chess Tac Toe</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1A1A2E;
  color: #fff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 12px 8px 20px;
  gap: 10px;
}

h1 {
  color: #E94560;
  font-style: italic;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: clamp(1.3em, 5vw, 2em);
  letter-spacing: 3px;
  text-align: center;
  margin-top: 4px;
}

.game-container {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: nowrap;
  justify-content: center;
}

/* ── Lobby panels ── */
.lobby-panel {
  background: #16213E;
  border-radius: 10px;
  padding: 12px 8px;
  width: 110px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

.lobby-title {
  font-size: 0.8em;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: bold;
}

.piece-card {
  background: #1e2a4a;
  border-radius: 8px;
  padding: 8px 6px 6px;
  width: 88px;
  text-align: center;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.15s, box-shadow 0.15s, opacity 0.15s;
  position: relative;
  user-select: none;
}

.piece-card:hover:not(.on-board) {
  border-color: #444;
}

.piece-card.selected {
  border-color: #7FC97F;
  box-shadow: 0 0 12px rgba(127, 201, 127, 0.55);
}

.piece-card.on-board {
  opacity: 0.45;
  cursor: default;
}

.piece-symbol {
  font-size: 2em;
  line-height: 1.1;
}

.piece-name {
  font-size: 0.65em;
  color: #aaa;
  margin-top: 3px;
  letter-spacing: 0.5px;
}

.on-board-badge {
  position: absolute;
  top: 3px;
  right: 3px;
  background: #3a3a5a;
  color: #888;
  font-size: 0.48em;
  padding: 1px 3px;
  border-radius: 3px;
  letter-spacing: 0.3px;
  line-height: 1.5;
}

/* ── Board ── */
.board-wrapper {
  position: relative;
  flex-shrink: 0;
}

.board {
  display: grid;
  grid-template-columns: repeat(4, var(--cell));
  grid-template-rows: repeat(4, var(--cell));
  border: 3px solid #555;
  border-radius: 2px;
  overflow: hidden;
}

.cell {
  width: var(--cell);
  height: var(--cell);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(var(--cell) * 0.52);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
  user-select: none;
  line-height: 1;
}

.cell.light  { background: #F0D9B5; }
.cell.dark   { background: #B58863; }
.cell.sel-bg { background: #7FC97F !important; }

/* subtle highlight for valid move targets */
.cell.valid-target::after {
  content: '';
  position: absolute;
  inset: 4px;
  border: 2px solid rgba(127,201,127,0.6);
  border-radius: 3px;
  pointer-events: none;
}
.cell.valid-capture::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 3px solid rgba(233,69,96,0.7);
  pointer-events: none;
}

/* ── Win overlay ── */
.win-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.82);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20;
  border-radius: 2px;
}

.win-text {
  color: #E94560;
  font-size: clamp(1.2em, 4vw, 1.7em);
  font-weight: bold;
  text-align: center;
  padding: 0 12px;
  margin-bottom: 18px;
  line-height: 1.4;
}

.play-again-btn {
  background: #E94560;
  color: #fff;
  border: none;
  padding: 11px 26px;
  border-radius: 6px;
  font-size: 1em;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 0.5px;
  transition: background 0.15s;
}
.play-again-btn:hover { background: #c7304d; }

/* ── Status bar ── */
.status-bar {
  background: #16213E;
  border-radius: 8px;
  padding: 10px 20px;
  text-align: center;
  width: 100%;
  max-width: 500px;
  font-size: 0.9em;
  line-height: 1.6;
}

.status-bar .turn-line { font-size: 1em; }
.status-bar .cd-line   { color: #E94560; font-weight: bold; min-height: 1.4em; }
.status-bar .hint-line { color: #888; font-size: 0.82em; }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #E94560;
  color: #fff;
  padding: 9px 20px;
  border-radius: 20px;
  font-size: 0.88em;
  font-weight: 500;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s;
  white-space: nowrap;
  z-index: 999;
  max-width: 90vw;
  text-align: center;
}
#toast.show { opacity: 1; }

/* ── Piece colors ── */
.piece-white {
  color: #F8F0D8;
  text-shadow: 0 0 3px #000, 0 1px 3px #000;
}
.piece-black {
  color: #1A1A1A;
  text-shadow: 0 0 3px rgba(255,255,255,0.8), 0 1px 3px rgba(255,255,255,0.5);
}

/* ── Responsive ── */
:root { --cell: 88px; }

@media (max-width: 520px) {
  :root { --cell: 66px; }
  .lobby-panel { width: 82px; padding: 8px 5px; }
  .piece-card  { width: 72px; padding: 6px 4px 5px; }
  .piece-symbol { font-size: 1.6em; }
  .piece-name   { font-size: 0.6em; }
  .game-container { gap: 8px; }
}

@media (max-width: 380px) {
  :root { --cell: 55px; }
  .lobby-panel { width: 68px; padding: 6px 4px; }
  .piece-card  { width: 60px; }
  .piece-symbol { font-size: 1.3em; }
}
</style>
</head>
<body>

<h1>CHESS TAC TOE</h1>

<div class="game-container">
  <div class="lobby-panel" id="white-lobby">
    <div class="lobby-title">White</div>
  </div>

  <div class="board-wrapper">
    <div class="board" id="board"></div>
    <div class="win-overlay" id="win-overlay">
      <div class="win-text" id="win-text"></div>
      <button class="play-again-btn" id="play-again-btn">Play Again</button>
    </div>
  </div>

  <div class="lobby-panel" id="black-lobby">
    <div class="lobby-title">Black</div>
  </div>
</div>

<div class="status-bar">
  <div class="turn-line" id="turn-line"></div>
  <div class="cd-line"   id="cd-line"></div>
  <div class="hint-line" id="hint-line"></div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
//  Constants
// ─────────────────────────────────────────────────────────────
const SYM = {
  white: { rook: '♖', knight: '♘', pawn: '♙' },
  black: { rook: '♜', knight: '♞', pawn: '♟' }
};
const PIECE_TYPES = ['rook', 'knight', 'pawn'];
const COLOR_NAME  = ['White', 'Black'];
const TURN_COLOR  = ['#F0D9B5', '#C89B55'];

// ─────────────────────────────────────────────────────────────
//  Game state
// ─────────────────────────────────────────────────────────────
let board;          // 4×4 array; each cell null | { color:'white'|'black', type, pieceIdx }
let players;        // array[2]
let curIdx;         // 0=white 1=black
let selLobby;       // null | { pIdx, pieceIdx }
let selBoard;       // null | { r, c }
let gameOver;
let toastTid;

function makePlayers() {
  return [0, 1].map(i => ({
    color:    i === 0 ? 'white' : 'black',
    cooldown: 0,
    pieces:   PIECE_TYPES.map(t => ({
      type:       t,
      status:     'IN_LOBBY',   // 'IN_LOBBY' | 'ON_BOARD'
      r:          null,
      c:          null,
      everPlaced: false         // true once it has been placed (for respawn restriction)
    }))
  }));
}

function initGame() {
  board    = Array.from({ length: 4 }, () => Array(4).fill(null));
  players  = makePlayers();
  curIdx   = 0;
  selLobby = null;
  selBoard = null;
  gameOver = false;
  document.getElementById('win-overlay').style.display = 'none';
  render();
}

// ─────────────────────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────────────────────
const cur  = ()   => players[curIdx];
const oIdx = ()   => 1 - curIdx;
const inB  = (r, c) => r >= 0 && r < 4 && c >= 0 && c < 4;

function onBoardCount(pIdx) {
  return players[pIdx].pieces.filter(p => p.status === 'ON_BOARD').length;
}

// Player must place (opening rule: need ≥2 on board before moving/capturing)
function mustPlace(pIdx) {
  return onBoardCount(pIdx) < 2;
}

// Return list of { r, c, isCapture } for a piece at (fr,fc) belonging to color
function getMoves(piece, fr, fc, color) {
  const moves = [];
  if (piece.type === 'rook') {
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      let r = fr + dr, c = fc + dc;
      while (inB(r, c)) {
        if (board[r][c] === null) {
          moves.push({ r, c, isCapture: false });
        } else if (board[r][c].color !== color) {
          moves.push({ r, c, isCapture: true });
          break;
        } else {
          break;
        }
        r += dr; c += dc;
      }
    }
  } else if (piece.type === 'knight') {
    for (const [dr, dc] of [[-2,-1],[-2,1],[2,-1],[2,1],[-1,-2],[-1,2],[1,-2],[1,2]]) {
      const r = fr + dr, c = fc + dc;
      if (!inB(r, c)) continue;
      if (board[r][c] === null) {
        moves.push({ r, c, isCapture: false });
      } else if (board[r][c].color !== color) {
        moves.push({ r, c, isCapture: true });
      }
    }
  } else { // pawn
    // Move: 1 orthogonal to empty
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const r = fr + dr, c = fc + dc;
      if (inB(r, c) && board[r][c] === null)
        moves.push({ r, c, isCapture: false });
    }
    // Capture: 1 diagonal to enemy
    for (const [dr, dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
      const r = fr + dr, c = fc + dc;
      if (inB(r, c) && board[r][c] !== null && board[r][c].color !== color)
        moves.push({ r, c, isCapture: true });
    }
  }
  return moves;
}

// Three positions form a winning line?
function collinear(pos) {
  if (pos.length < 3) return false;
  const [a, b, c] = pos;
  return (a.r === b.r && b.r === c.r) ||                           // row
         (a.c === b.c && b.c === c.c) ||                           // col
         ((a.r - a.c) === (b.r - b.c) && (b.r - b.c) === (c.r - c.c)) || // diag ↘
         ((a.r + a.c) === (b.r + b.c) && (b.r + b.c) === (c.r + c.c));   // diag ↗
}

function checkWin(pIdx) {
  const pos = players[pIdx].pieces
    .filter(p => p.status === 'ON_BOARD')
    .map(p => ({ r: p.r, c: p.c }));
  return pos.length === 3 && collinear(pos);
}

// Would placing pIdx's piece at (r,c) immediately complete a winning line?
function wouldWin(pIdx, r, c) {
  const pos = players[pIdx].pieces
    .filter(p => p.status === 'ON_BOARD')
    .map(p => ({ r: p.r, c: p.c }));
  pos.push({ r, c });
  return pos.length === 3 && collinear(pos);
}

// ─────────────────────────────────────────────────────────────
//  Toast
// ─────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTid);
  toastTid = setTimeout(() => el.classList.remove('show'), 2600);
}

function clearSel() {
  selLobby = null;
  selBoard = null;
}

// ─────────────────────────────────────────────────────────────
//  Turn switching
// ─────────────────────────────────────────────────────────────
function switchPlayer() {
  // Decrement the cooldown of the player who just finished their turn
  players[curIdx].cooldown = Math.max(0, players[curIdx].cooldown - 1);
  curIdx = 1 - curIdx;
}

// ─────────────────────────────────────────────────────────────
//  Core actions
// ─────────────────────────────────────────────────────────────
function doPlace(r, c) {
  const player   = cur();
  const pieceIdx = selLobby.pieceIdx;
  const piece    = player.pieces[pieceIdx];

  // Cannot place (initial or respawn) on a square that immediately completes a winning line
  if (wouldWin(curIdx, r, c)) {
    toast("Cannot place here — would immediately complete a winning line!");
    clearSel();
    render();
    return;
  }

  // Place it
  piece.status     = 'ON_BOARD';
  piece.r          = r;
  piece.c          = c;
  piece.everPlaced = true;
  board[r][c]      = { color: player.color, type: piece.type, pieceIdx };

  clearSel();
  render();                        // ← piece appears on board visually first

  if (checkWin(curIdx)) { showWin(); return; }

  switchPlayer();
  render();
}

function doMove(tr, tc) {
  const player               = cur();
  const { r: fr, c: fc }    = selBoard;
  const cell                 = board[fr][fc];
  const piece                = player.pieces[cell.pieceIdx];
  const moves                = getMoves(piece, fr, fc, player.color);
  const mv                   = moves.find(m => m.r === tr && m.c === tc);

  if (!mv) {
    toast("Invalid move for this piece!");
    clearSel();
    render();
    return;
  }

  if (mv.isCapture && player.cooldown > 0) {
    toast(`⚔ Capture on cooldown — wait ${player.cooldown} more turn${player.cooldown > 1 ? 's' : ''}!`);
    clearSel();
    render();
    return;
  }

  // Execute capture
  if (mv.isCapture) {
    const tgt  = board[tr][tc];
    const opP  = players[tgt.color === 'white' ? 0 : 1];
    const capP = opP.pieces[tgt.pieceIdx];
    capP.status = 'IN_LOBBY';
    capP.r      = null;
    capP.c      = null;
    // Set capturing player's cooldown to 2; switchPlayer() will decrement it to 1
    player.cooldown = 2;
  }

  // Move piece
  board[fr][fc] = null;
  board[tr][tc] = { color: player.color, type: piece.type, pieceIdx: cell.pieceIdx };
  piece.r = tr;
  piece.c = tc;

  clearSel();
  render();                        // ← new position appears first

  if (checkWin(curIdx)) { showWin(); return; }

  switchPlayer();
  render();
}

function showWin() {
  gameOver = true;
  const name = COLOR_NAME[curIdx];
  document.getElementById('win-text').textContent = `${name} Wins! 🏆`;
  document.getElementById('win-overlay').style.display = 'flex';
}

// ─────────────────────────────────────────────────────────────
//  Click handlers
// ─────────────────────────────────────────────────────────────
function onLobbyClick(pIdx, pieceIdx) {
  if (gameOver) return;
  if (pIdx !== curIdx) { toast("It's not your turn!"); return; }

  const piece = players[pIdx].pieces[pieceIdx];
  if (piece.status === 'ON_BOARD') return;   // ON BOARD — not selectable

  // Toggle deselect
  if (selLobby && selLobby.pIdx === pIdx && selLobby.pieceIdx === pieceIdx) {
    clearSel();
  } else {
    clearSel();
    selLobby = { pIdx, pieceIdx };
  }
  render();
}

function onCellClick(r, c) {
  if (gameOver) return;
  const player = cur();
  const cell   = board[r][c];

  // ── Lobby piece selected → place ──────────────────────────
  if (selLobby !== null) {
    if (cell !== null) {
      if (cell.color === player.color) {
        // Clicking own board piece while lobby selected: switch to board selection
        if (!mustPlace(curIdx)) {
          clearSel();
          selBoard = { r, c };
          render();
          return;
        }
        toast("You must place a piece from your lobby first!");
        clearSel();
        render();
        return;
      }
      toast("Cannot place on an occupied square!");
      clearSel();
      render();
      return;
    }
    doPlace(r, c);
    return;
  }

  // ── Board piece selected → move / capture ────────────────
  if (selBoard !== null) {
    const { r: sr, c: sc } = selBoard;

    if (sr === r && sc === c) { clearSel(); render(); return; } // deselect

    if (cell !== null && cell.color === player.color) {
      // Switch to another own piece
      clearSel();
      selBoard = { r, c };
      render();
      return;
    }

    doMove(r, c);
    return;
  }

  // ── Nothing selected ─────────────────────────────────────
  if (cell !== null && cell.color === player.color) {
    if (mustPlace(curIdx)) {
      toast("Place a piece from your lobby first!");
      return;
    }
    selBoard = { r, c };
    render();
    return;
  }

  if (cell !== null && cell.color !== player.color) {
    if (mustPlace(curIdx)) {
      toast("Place a piece from your lobby first!");
    } else {
      toast("Select one of your own pieces first!");
    }
  }
}

// ─────────────────────────────────────────────────────────────
//  Rendering
// ─────────────────────────────────────────────────────────────
function render() {
  renderBoard();
  renderLobby(0, 'white-lobby');
  renderLobby(1, 'black-lobby');
  renderStatus();
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  // Compute valid destinations for the selected board piece
  const validMoves = new Map();
  if (selBoard !== null) {
    const { r: sr, c: sc } = selBoard;
    const cell = board[sr][sc];
    if (cell) {
      const player = players[cell.color === 'white' ? 0 : 1];
      const piece  = player.pieces[cell.pieceIdx];
      getMoves(piece, sr, sc, cell.color).forEach(m => {
        validMoves.set(`${m.r},${m.c}`, m.isCapture ? 'cap' : 'move');
      });
    }
  }

  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const div  = document.createElement('div');
      const lite = (r + c) % 2 === 0;
      div.className = 'cell ' + (lite ? 'light' : 'dark');

      if (selBoard && selBoard.r === r && selBoard.c === c) {
        div.classList.add('sel-bg');
      } else {
        const key = `${r},${c}`;
        if (validMoves.has(key)) {
          div.classList.add(validMoves.get(key) === 'cap' ? 'valid-capture' : 'valid-target');
        }
      }

      const bp = board[r][c];
      if (bp) {
        div.textContent = SYM[bp.color][bp.type];
        div.classList.add(bp.color === 'white' ? 'piece-white' : 'piece-black');
      }

      div.addEventListener('click', () => onCellClick(r, c));
      boardEl.appendChild(div);
    }
  }
}

function renderLobby(pIdx, containerId) {
  const player    = players[pIdx];
  const container = document.getElementById(containerId);
  const titleEl   = container.querySelector('.lobby-title');
  container.innerHTML = '';
  container.appendChild(titleEl);

  player.pieces.forEach((piece, idx) => {
    const card = document.createElement('div');
    card.className = 'piece-card';

    const isOnBoard  = piece.status === 'ON_BOARD';
    const isSelected = selLobby && selLobby.pIdx === pIdx && selLobby.pieceIdx === idx;

    if (isOnBoard)  card.classList.add('on-board');
    if (isSelected) card.classList.add('selected');

    const sym  = document.createElement('div');
    sym.className   = `piece-symbol piece-${player.color}`;
    sym.textContent = SYM[player.color][piece.type];

    const name = document.createElement('div');
    name.className   = 'piece-name';
    name.textContent = piece.type.charAt(0).toUpperCase() + piece.type.slice(1);

    card.appendChild(sym);
    card.appendChild(name);

    if (isOnBoard) {
      const badge = document.createElement('div');
      badge.className   = 'on-board-badge';
      badge.textContent = 'ON BOARD';
      card.appendChild(badge);
    }

    card.addEventListener('click', () => onLobbyClick(pIdx, idx));
    container.appendChild(card);
  });
}

function renderStatus() {
  const player = cur();
  const cname  = COLOR_NAME[curIdx];
  const ccol   = TURN_COLOR[curIdx];

  let hint = '';
  if (mustPlace(curIdx)) {
    hint = 'Select a lobby piece to place on the board';
  } else if (selLobby !== null) {
    hint = 'Click an empty square to place — or click a board piece to move';
  } else if (selBoard !== null) {
    hint = 'Click a destination to move, or click an enemy piece to capture';
  } else {
    const inLobby = player.pieces.filter(p => p.status === 'IN_LOBBY').length;
    if (inLobby > 0) hint = 'Select a lobby piece or a board piece';
    else              hint = 'Select one of your board pieces to move';
  }

  document.getElementById('turn-line').innerHTML =
    `<span style="color:${ccol};font-weight:bold">${cname}'s Turn</span>`;
  document.getElementById('cd-line').textContent =
    player.cooldown > 0 ? `⚔ COOLDOWN: ${player.cooldown}` : '';
  document.getElementById('hint-line').textContent = hint;
}

// ─────────────────────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────────────────────
document.getElementById('play-again-btn').addEventListener('click', initGame);
initGame();
</script>
</body>
</html>
